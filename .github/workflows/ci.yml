name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Validate app structure
        run: node -e "const app = require('./index'); console.log('OK:', Object.keys(app.triggers).length, 'triggers,', Object.keys(app.creates).length, 'creates,', Object.keys(app.searches).length, 'searches')"
